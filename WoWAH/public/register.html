<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — WoW AH</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="card">
    <h1>WoW Auction House</h1>
    <h2>Create account</h2>

    <div id="alert" class="alert hidden"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password <span class="hint">(min. 6 characters)</span></label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="/login.html">Log in</a></p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) return showAlert(data.error, 'error');
        showAlert(data.message, 'success');
        document.getElementById('registerForm').reset();
      } catch {
        showAlert('Could not connect to server.', 'error');
      }
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
    }
  </script>
</body>
</html>
