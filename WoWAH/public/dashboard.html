<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Auction House</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">WoW Auction House</span>
    <div class="navbar-links" id="navLinks"></div>
    <a class="bmac-nav-btn" href="https://buymeacoffee.com/jozsefszabo" target="_blank" rel="noopener">☕ Support</a>
  </nav>

  <div class="page-layout">

  <!-- ── Left ad sidebar ── -->
  <aside class="ad-sidebar ad-sidebar-left">
    <div class="ad-slot ad-slot-skyscraper">
      <!-- 160×600 ad unit — replace this comment with your AdSense/ad-network script -->
      <span class="ad-label">Advertisement</span>
    </div>
  </aside>

  <main class="container">

    <!-- ── Status bar ── -->
    <div class="status-bar">
      <span id="statusText" class="muted">Loading…</span>
      <div class="toolbar-right">
        <select id="regionSelect" class="region-select">
          <option value="eu">EU</option>
          <option value="us">US</option>
          <option value="kr">KR</option>
          <option value="tw">TW</option>
        </select>
      </div>
    </div>

    <div id="globalAlert" class="alert hidden"></div>

    <!-- ── Tabs ── -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="commodities">Crafting</button>
      <button class="tab-btn" data-tab="realms">Flipping</button>
    </div>

    <!-- ── Tab: Commodities ── -->
    <div id="tab-commodities" class="tab-pane">

      <!-- ── Character panel ── -->
      <div class="char-panel" id="charPanel">
        <div class="char-panel-header">
          <span class="char-panel-title">🧙 Character Filter</span>
          <span class="char-panel-hint">Load a character to filter crafts by their known recipes</span>
        </div>
        <div class="char-panel-inputs">
          <input id="charRealm" class="char-input" type="text" placeholder="Realm (e.g. Silvermoon)">
          <input id="charName"  class="char-input" type="text" placeholder="Character name">
          <button class="btn char-load-btn" id="charLoadBtn" onclick="loadCharacter()">Load</button>
          <button class="btn char-clear-btn hidden" id="charClearBtn" onclick="clearCharacter()">✕ Clear</button>
        </div>
        <div id="charStatus" class="char-status"></div>
        <div id="charProfessions" class="char-professions"></div>
        <div id="charCraftingStats" class="char-crafting-stats hidden">
          <div class="cstat-title">Crafting Stats <span class="cstat-hint">Prefilled from equipped gear — you can adjust</span></div>
          <div class="cstat-grid">
            <label class="cstat-label">Multicraft
              <div class="cstat-input-wrap"><input id="cstatMulticraft" class="cstat-input" type="number" min="0" max="100" step="0.1"><span class="cstat-unit">%</span></div>
            </label>
            <label class="cstat-label">Resourcefulness
              <div class="cstat-input-wrap"><input id="cstatResourcefulness" class="cstat-input" type="number" min="0" max="100" step="0.1"><span class="cstat-unit">%</span></div>
            </label>
            <label class="cstat-label">Inspiration
              <div class="cstat-input-wrap"><input id="cstatInspiration" class="cstat-input" type="number" min="0" max="100" step="0.1"><span class="cstat-unit">%</span></div>
            </label>
            <label class="cstat-label">Ingenuity
              <div class="cstat-input-wrap"><input id="cstatConcGold" class="cstat-input" type="number" min="0" step="1" placeholder="0"><span class="cstat-unit">g / charge</span></div>
            </label>
          </div>
          <div id="charConcentration" class="char-concentration hidden"></div>
        </div>
      </div>

      <div class="tab-toolbar">
        <select id="expansionSelect" class="region-select">
          <option value="Midnight">Midnight</option>
          <option value="The War Within">The War Within</option>
          <option value="Dragonflight">Dragonflight</option>
          <option value="Shadowlands">Shadowlands</option>
          <option value="Battle for Azeroth">Battle for Azeroth</option>
          <option value="Legion">Legion</option>
          <option value="Warlords of Draenor">Warlords of Draenor</option>
          <option value="Mists of Pandaria">Mists of Pandaria</option>
          <option value="Cataclysm">Cataclysm</option>
          <option value="Wrath of the Lich King">Wrath of the Lich King</option>
          <option value="The Burning Crusade">The Burning Crusade</option>
          <option value="Classic">Classic</option>
          <option value="all">All expansions</option>
        </select>
        <div class="crafting-search-wrap">
          <input id="craftingSearch" class="crafting-search" type="text" placeholder="Search items…" oninput="onCraftingSearch(this.value)" autocomplete="off">
          <button id="craftingSearchClear" class="crafting-search-clear hidden" onclick="clearCraftingSearch()" title="Clear search">✕</button>
        </div>
        <div id="charSkillBar" class="char-skill-bar hidden"></div>
      </div>
      <div id="professionFilter" class="prof-filter"></div>
      <p id="craftingEmptyMsg" class="muted">Loading crafting data…</p>
      <div id="craftingGroups"></div>
    </div>

    <!-- ── Tab: Flipping ── -->
    <div id="tab-realms" class="tab-pane hidden">
      <div class="flip-category-bar">
        <button class="flip-cat-btn active" data-category="all">All</button>
        <button class="flip-cat-btn" data-category="gear">Gear</button>
        <button class="flip-cat-btn" data-category="consumable">Consumables</button>
        <button class="flip-cat-btn" data-category="material">Materials</button>
        <button class="flip-cat-btn" data-category="recipe">Recipes</button>
        <button class="flip-cat-btn" data-category="pet">Battle Pets</button>
        <button class="flip-cat-btn" data-category="container">Bags</button>
        <button class="flip-cat-btn" data-category="misc">Misc</button>
      </div>
      <p id="flipEmptyMsg" class="muted hidden"></p>
      <div id="flipTable"></div>
    </div>

  <!-- ── Chart modal ── -->
  <div id="chartModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span id="chartTitle">Price History</span>
        <button onclick="closeChart()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="chart-controls">
          <button class="btn btn-sm chart-range active" data-days="7">7d</button>
          <button class="btn btn-sm chart-range" data-days="14">14d</button>
          <button class="btn btn-sm chart-range" data-days="30">30d</button>
        </div>
        <div id="analysisBar" class="analysis-bar"></div>
        <canvas id="priceChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <script>
    var activeChart  = null;
    var activeItemId = null;

    // ── Nav ───────────────────────────────────────────────────
    fetch('/api/auth/me')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(user) {
        var nav = document.getElementById('navLinks');
        if (user) {
          nav.innerHTML = '<button class="btn btn-sm" id="logoutBtn">Log out</button>';
          document.getElementById('logoutBtn').addEventListener('click', function() {
            fetch('/api/auth/logout', { method: 'POST' }).then(function() { window.location.reload(); });
          });
        }
      });

    // ── Tabs ──────────────────────────────────────────────────
    var activeTab = 'commodities';
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.add('hidden'); });
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        document.getElementById('tab-' + activeTab).classList.remove('hidden');
        if (activeTab === 'realms' && !flipLoaded) loadFlipping();
      });
    });

    // ── Region selector ───────────────────────────────────────
    var regionSelect   = document.getElementById('regionSelect');
    regionSelect.value = localStorage.getItem('wowah_region') || 'eu';

    regionSelect.addEventListener('change', function() {
      localStorage.setItem('wowah_region', regionSelect.value);
      flipLoaded = false;
      loadStatus();
      loadCrafting();
      if (activeTab === 'realms') loadFlipping();
    });

    function getRegion() { return regionSelect.value; }

    // ── Expansion selector (commodities) ──────────────────────
    var expansionSelect   = document.getElementById('expansionSelect');
    expansionSelect.value = localStorage.getItem('wowah_expansion') || 'Midnight';

    expansionSelect.addEventListener('change', function() {
      localStorage.setItem('wowah_expansion', expansionSelect.value);
      filterByExpansion(expansionSelect.value, 'craftingGroups', 'craftingEmptyMsg');
      updateCharSkillBar();
    });

    // ── Flipping category filter ──────────────────────────────
    var activeFlipCategory = localStorage.getItem('wowah_flip_category') || 'all';
    var flipLoaded = false;

    document.querySelectorAll('.flip-cat-btn').forEach(function(btn) {
      if (btn.dataset.category === activeFlipCategory) {
        document.querySelectorAll('.flip-cat-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      }
      btn.addEventListener('click', function() {
        document.querySelectorAll('.flip-cat-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeFlipCategory = btn.dataset.category;
        localStorage.setItem('wowah_flip_category', activeFlipCategory);
        flipLoaded = false;
        loadFlipping();
      });
    });

    function filterByExpansion(exp, groupsId, emptyId) {
      var profGroups = document.querySelectorAll('#' + groupsId + ' .profession-group');
      var anyVisible = false;
      profGroups.forEach(function(profGroup) {
        var hasVisible = false;
        profGroup.querySelectorAll('.expansion-group').forEach(function(g) {
          var show = (exp === 'all' || g.dataset.expansion === exp);
          g.style.display = show ? '' : 'none';
          if (show) hasVisible = true;
        });
        profGroup.style.display = hasVisible ? '' : 'none';
        if (hasVisible) anyVisible = true;
      });
      var empty = document.getElementById(emptyId);
      if (!anyVisible && profGroups.length > 0) {
        empty.classList.remove('hidden');
        empty.textContent = 'No crafts found for "' + exp + '".';
      } else {
        empty.classList.add('hidden');
      }
    }

    // ── Status ────────────────────────────────────────────────
    function loadStatus() {
      fetch('/api/prices/status?region=' + getRegion())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var txt = d.last_fetch
            ? 'Last update: ' + d.last_fetch + ' UTC (' + getRegion().toUpperCase() + ') — ' + d.total_data_points.toLocaleString() + ' data points'
            : 'No data yet for ' + getRegion().toUpperCase();
          document.getElementById('statusText').textContent = txt;
        })
        .catch(function() {});
    }
    loadStatus();

    // ── Flipping data ─────────────────────────────────────────
    function loadFlipping() {
      flipLoaded = true;
      var emptyEl = document.getElementById('flipEmptyMsg');
      var tableEl = document.getElementById('flipTable');
      emptyEl.textContent = 'Loading…';
      emptyEl.classList.remove('hidden');
      tableEl.innerHTML = '';

      fetch('/api/flipping?region=' + getRegion() + '&category=' + activeFlipCategory)
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
          if (!result.ok) {
            emptyEl.textContent = result.data.error || 'Failed to load flipping data.';
            return;
          }
          renderFlipping(result.data);
        })
        .catch(function() {
          emptyEl.textContent = 'Could not load flipping data.';
          emptyEl.classList.remove('hidden');
        });
    }

    function renderFlipping(items) {
      var emptyEl = document.getElementById('flipEmptyMsg');
      var tableEl = document.getElementById('flipTable');

      if (!items.length) {
        emptyEl.textContent = 'No flipping opportunities found for this category.';
        emptyEl.classList.remove('hidden');
        tableEl.innerHTML = '';
        return;
      }
      emptyEl.classList.add('hidden');

      var rows = items.map(function(item) {
        var iconHtml = item.icon
          ? '<img src="' + escHtml(item.icon) + '" alt="" class="item-icon" onerror="this.style.display=\'none\'">'
          : '<span class="item-icon-placeholder"></span>';

        var name = escHtml(item.name || ('Item #' + item.item_id));
        var qualityLabel = item.quality > 0 ? ' <span class="flip-quality">R' + item.quality + '</span>' : '';
        var ilvlLabel    = item.item_level > 0 ? '<div class="flip-ilvl">ilvl ' + item.item_level + '</div>' : '';

        function realmEntry(r, isBuy) {
          var priceClass = isBuy ? 'flip-buy-price' : 'flip-sell-price';
          return '<div class="flip-realm-entry">' +
            '<span class="flip-realm-name" title="' + escHtml(r.realm_names) + '">' + escHtml(r.realm_names) + '</span>' +
            '<span class="' + priceClass + '">' + formatGoldShort(r.unit_price) + '</span>' +
            '</div>';
        }

        var buyHtml  = item.buy_realms.map(function(r)  { return realmEntry(r, true);  }).join('');
        var sellHtml = item.sell_realms.map(function(r) { return realmEntry(r, false); }).join('');

        return '<tr>' +
          '<td>' + iconHtml + '</td>' +
          '<td>' +
            '<a href="https://www.wowhead.com/item=' + item.item_id + '" target="_blank" rel="noopener">' + name + '</a>' +
            qualityLabel + ilvlLabel +
          '</td>' +
          '<td><div class="flip-realm-list">' + buyHtml  + '</div></td>' +
          '<td><div class="flip-realm-list">' + sellHtml + '</div></td>' +
          '<td class="flip-spread">' + formatGoldShort(item.spread) + '</td>' +
        '</tr>';
      }).join('');

      tableEl.innerHTML =
        '<table>' +
          '<thead><tr>' +
            '<th style="width:44px"></th>' +
            '<th>Item</th>' +
            '<th>Buy From <span class="hint">(cheapest realms)</span></th>' +
            '<th>Sell On <span class="hint">(most expensive realms)</span></th>' +
            '<th>Spread</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>';
    }

    // ── Commodities crafting ──────────────────────────────────
    var cachedCraftingData      = null;
    var currentTableHasSubCraft = false;

    loadCrafting();

    function loadCrafting() {
      cachedCraftingData = null;
      document.getElementById('craftingEmptyMsg').textContent = 'Loading crafting data…';
      document.getElementById('craftingEmptyMsg').classList.remove('hidden');
      document.getElementById('craftingGroups').innerHTML = '';
      document.getElementById('professionFilter').innerHTML = '';

      fetch('/api/recipes/crafting?region=' + getRegion())
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
          if (!result.ok) {
            document.getElementById('craftingEmptyMsg').textContent = result.data.error || 'Failed to load crafting data.';
            return;
          }
          cachedCraftingData = result.data;
          reRenderCrafting();
        })
        .catch(function() {
          document.getElementById('craftingEmptyMsg').textContent = 'Could not load crafting data.';
        });
    }

    var craftingSearchTerm = '';

    function reRenderCrafting() {
      if (!cachedCraftingData) return;
      var data = cachedCraftingData;
      if (craftingSearchTerm) {
        var q = craftingSearchTerm.toLowerCase();
        data = data.filter(function(item) {
          return (item.item_name  && item.item_name.toLowerCase().indexOf(q)  !== -1) ||
                 (item.recipe_name && item.recipe_name.toLowerCase().indexOf(q) !== -1);
        });
      }
      renderCrafting(data, 'craftingGroups', 'professionFilter', 'craftingEmptyMsg', expansionSelect.value);
    }

    function onCraftingSearch(val) {
      craftingSearchTerm = val.trim();
      document.getElementById('craftingSearchClear').classList.toggle('hidden', !craftingSearchTerm);
      reRenderCrafting();
    }

    function clearCraftingSearch() {
      craftingSearchTerm = '';
      document.getElementById('craftingSearch').value = '';
      document.getElementById('craftingSearchClear').classList.add('hidden');
      reRenderCrafting();
    }


    // ── Shared render logic ───────────────────────────────────
    var EXPANSION_ORDER = [
      'Midnight', 'The War Within', 'Dragonflight', 'Shadowlands',
      'Battle for Azeroth', 'Legion', 'Warlords of Draenor',
      'Mists of Pandaria', 'Cataclysm', 'Wrath of the Lich King',
      'The Burning Crusade', 'Classic', 'Unknown'
    ];

    function renderCrafting(items, groupsId, filterId, emptyId, currentExpansion) {
      var groupsEl = document.getElementById(groupsId);
      var filterEl = document.getElementById(filterId);
      var empty    = document.getElementById(emptyId);

      if (!items.length) {
        groupsEl.innerHTML = '';
        filterEl.innerHTML = '';
        empty.classList.remove('hidden');
        empty.textContent = 'No profitable crafts found.';
        return;
      }
      empty.classList.add('hidden');

      var grouped = {};
      items.forEach(function(item) {
        var prof = item.profession || 'Unknown';
        var exp  = item.expansion  || 'Unknown';
        if (!grouped[prof]) grouped[prof] = {};
        if (!grouped[prof][exp]) grouped[prof][exp] = [];
        grouped[prof][exp].push(item);
      });

      var professions = Object.keys(grouped).sort();

      filterEl.innerHTML = professions.map(function(prof) {
        var id = groupsId + '-prof-' + prof.replace(/\s+/g, '-');
        return '<button class="prof-btn" onclick="document.getElementById(\'' + id + '\').scrollIntoView({behavior:\'smooth\',block:\'start\'});document.getElementById(\'' + id + '\').querySelector(\'details\').open=true">' + escHtml(prof) + '</button>';
      }).join('');

      var hasStats   = loadedCharacter && loadedCharacter.craftingStats &&
        (loadedCharacter.craftingStats.multicraft_pct > 0 || loadedCharacter.craftingStats.resourcefulness_pct > 0 || loadedCharacter.craftingStats.conc_gold_per_charge > 0);
      currentTableHasSubCraft = items.some(function(it) { return it.has_sub_crafts; });
      var hasSubCraft = currentTableHasSubCraft;
      var THEAD = '<thead><tr>' +
        '<th style="width:44px"></th>' +
        '<th>Crafted Item</th>' +
        '<th>Sell Price <span class="hint">(×qty)</span></th>' +
        '<th>Direct Cost</th>' +
        '<th>Optimal Cost <span class="hint">(cheapest quality)</span></th>' +
        '<th>Profit</th>' +
        (hasSubCraft ? '<th>Sub-craft Profit <span class="hint">craft your mats</span></th>' : '') +
        (hasStats    ? '<th>Adj. Profit <span class="hint">with your stats</span></th>' : '') +
        '<th>Trend</th>' +
        '<th style="width:32px"></th>' +
        '</tr></thead>';

      groupsEl.innerHTML = professions.map(function(prof) {
        var profData   = grouped[prof];
        var totalCount = EXPANSION_ORDER.concat(
          Object.keys(profData).filter(function(e) { return EXPANSION_ORDER.indexOf(e) < 0; })
        ).reduce(function(s, e) { return s + (profData[e] ? profData[e].length : 0); }, 0);

        var expansionsHtml = EXPANSION_ORDER
          .concat(Object.keys(profData).filter(function(e) { return EXPANSION_ORDER.indexOf(e) < 0; }))
          .filter(function(exp) { return profData[exp] && profData[exp].length > 0 && exp !== 'Unknown'; })
          .map(function(exp) {
            var expItems = profData[exp].slice().sort(function(a, b) { return b.optimal_profit - a.optimal_profit; });
            var rows = expItems.map(function(item) { return buildCraftingRow(item); }).join('');
            return '<div class="expansion-group" data-expansion="' + escHtml(exp) + '">' +
              '<details open>' +
              '<summary><span class="exp-name">' + escHtml(exp) + '</span><span class="exp-count">' + expItems.length + ' crafts</span></summary>' +
              '<div><table>' + THEAD + '<tbody>' + rows + '</tbody></table></div>' +
              '</details></div>';
          }).join('');

        var id = groupsId + '-prof-' + prof.replace(/\s+/g, '-');
        return '<div class="profession-group" id="' + id + '">' +
          '<details open>' +
          '<summary><span class="prof-name">' + escHtml(prof) + '</span><span class="prof-count">' + totalCount + ' crafts</span></summary>' +
          '<div class="expansion-groups">' + expansionsHtml + '</div>' +
          '</details></div>';
      }).join('');

      filterByExpansion(currentExpansion, groupsId, emptyId);
      if (groupsId === 'craftingGroups') applyCharacterFilter();
      loadTrendBadges(groupsEl);
    }

    function buildCraftingRow(item) {
      var iconHtml    = item.item_icon
        ? '<img src="' + item.item_icon + '" alt="" class="item-icon" onerror="this.style.display=\'none\'">'
        : '<span class="item-icon-placeholder"></span>';
      var name        = item.item_name || ('Item #' + item.item_id);
      var sellTotal   = item.sell_price * item.crafted_quantity;
      var profitClass = (item.optimal_profit > 0 || item.direct_profit > 0) ? 'profit-positive' : 'profit-negative';

      // Determine column count for reagent row colspan (base 8 + optional sub-craft col + optional adj col)
      var stats      = loadedCharacter && loadedCharacter.craftingStats;
      var hasStats   = stats && (stats.multicraft_pct > 0 || stats.resourcefulness_pct > 0 || stats.conc_gold_per_charge > 0);

      var reagentRows = item.reagents.map(function(rg) {
        var rgName      = rg.name || ('Item #' + rg.item_id);
        var hasVariants = rg.variants && rg.variants.length > 1;
        var cheaperNote = (rg.best_price < rg.unit_price)
          ? ' <span class="cheaper-badge">cheaper variant available</span>' : '';

        // ── Sub-craft badge ──────────────────────────────────────
        var subCraftNote = '';
        if (rg.sub_craft) {
          var sc       = rg.sub_craft;
          var buyTotal = rg.best_price * rg.quantity;
          var craftTotal = sc.cost_per_unit * rg.quantity;

          // Crafting-stats-adjusted craft cost per unit of this reagent
          var craftTotalAdj = craftTotal;
          if (stats) {
            var mc  = (stats.multicraft_pct      || 0) / 100;
            var res = (stats.resourcefulness_pct || 0) / 100;
            // More items per craft (mc) and fewer sub-reagents used (res)
            craftTotalAdj = craftTotal * (1 - res * 0.35) / (1 + mc);
          }

          var cheaperToCraft = craftTotalAdj < buyTotal;
          subCraftNote = ' <span class="subcraft-badge ' + (cheaperToCraft ? 'subcraft-cheaper' : 'subcraft-pricier') + '">' +
            '🔨 ' + (cheaperToCraft ? 'Craft: ' + formatGoldShort(craftTotalAdj) + ' (save ' + formatGoldShort(buyTotal - craftTotalAdj) + ')' : 'Craft: ' + formatGoldShort(craftTotalAdj) + ' (buy cheaper)') +
          '</span>';
        }

        var variantHtml = '';
        if (hasVariants) {
          variantHtml = rg.variants.map(function(v) {
            var vName      = v.name || ('Item #' + v.item_id);
            var isCheapest = v.unit_price === rg.best_price;
            return '<tr class="variant-row hidden">' +
              '<td></td>' +
              '<td class="reagent-name" style="padding-left:52px">' +
                (isCheapest ? '★ ' : '  ') +
                '<a href="https://www.wowhead.com/item=' + v.item_id + '" target="_blank" rel="noopener">' + escHtml(vName) + '</a>' +
              '</td>' +
              '<td></td><td></td>' +
              '<td class="price' + (isCheapest ? ' best-price' : '') + '">' + formatGold(v.unit_price * rg.quantity) + '</td>' +
              '<td></td>' +
              (currentTableHasSubCraft ? '<td></td>' : '') +
              (hasStats ? '<td></td>' : '') +
              '<td><span class="trend-badge" data-item="' + v.item_id + '">…</span></td>' +
              '<td></td></tr>';
          }).join('');
        }

        var hasSubExpand = rg.sub_craft && rg.sub_craft.sub_reagents && rg.sub_craft.sub_reagents.length > 0;
        var subCraftTreeHtml = rg.sub_craft ? renderSubCraftTree(rg.sub_craft, 0) : '';
        return '<tr class="reagent-row hidden">' +
          '<td></td>' +
          '<td class="reagent-name">↳ <a href="https://www.wowhead.com/item=' + rg.item_id + '" target="_blank" rel="noopener">' + escHtml(rgName) + '</a>' +
            ' ×' + rg.quantity + cheaperNote + subCraftNote +
            (hasSubExpand ? ' <button class="btn-toggle btn-tiny" onclick="toggleSubReagents(this)" title="Show sub-materials">🔨</button>' : '') +
            (hasVariants  ? ' <button class="btn-toggle btn-tiny" onclick="toggleVariants(this)">+</button>' : '') +
          '</td>' +
          '<td></td>' +
          '<td class="price">' + formatGold(rg.unit_price * rg.quantity) + '</td>' +
          '<td class="price best-price">' + formatGold(rg.best_price * rg.quantity) + '</td>' +
          '<td></td>' +
          (currentTableHasSubCraft ? '<td></td>' : '') +
          (hasStats ? '<td></td>' : '') +
          '<td><span class="trend-badge" data-item="' + rg.item_id + '">…</span></td>' +
          '<td></td></tr>' + subCraftTreeHtml + variantHtml;
      }).join('');

      // Sell price cell: commodity items show one price; realm items show top-3 sell realms
      var sellPriceCell;
      if (item.is_realm_item && item.sell_realms && item.sell_realms.length) {
        sellPriceCell =
          '<td class="price crafting-realm-sell-cell">' +
            '<div class="flip-realm-list">' +
              item.sell_realms.map(function(r) {
                return '<div class="flip-realm-entry">' +
                  '<span class="flip-realm-name" title="' + escHtml(r.realm_names) + '">' + escHtml(r.realm_names) + '</span>' +
                  '<span class="flip-sell-price">' + formatGoldShort(r.unit_price * item.crafted_quantity) + '</span>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</td>';
      } else {
        sellPriceCell = '<td class="price">' + formatGold(sellTotal) + '</td>';
      }

      // ── Sub-craft profit ──────────────────────────────────────
      var subCraftProfitCell = '';
      if (item.has_sub_crafts) {
        var sc_stats  = loadedCharacter && loadedCharacter.craftingStats;
        var sc_mc     = sc_stats ? (sc_stats.multicraft_pct      || 0) / 100 : 0;
        var sc_res    = sc_stats ? (sc_stats.resourcefulness_pct || 0) / 100 : 0;
        var sc_conc   = sc_stats ? (sc_stats.conc_gold_per_charge || 0) * 10000 : 0;

        // Compute deep cost: for each reagent use min(buy, craft_adj)
        var deepCostAdj = item.reagents.reduce(function(s, rg) {
          var buy = rg.best_price;
          if (rg.sub_craft && rg.sub_craft.cost_per_unit > 0) {
            var craftAdj = rg.sub_craft.cost_per_unit * (1 - sc_res * 0.35) / (sc_mc > 0 ? 1 + sc_mc : 1);
            buy = Math.min(buy, craftAdj);
          }
          return s + rg.quantity * buy;
        }, 0);

        var deepSellAdj = sellTotal * (1 + sc_mc);
        var deepProfitAdj = deepSellAdj - deepCostAdj - sc_conc;
        var deepClass = deepProfitAdj > 0 ? 'profit-positive' : 'profit-negative';
        var deepDelta = deepProfitAdj - item.optimal_profit;
        var deepTip   = 'Craft your mats' + (sc_stats ? ' + your crafting stats' : '');
        subCraftProfitCell =
          '<td class="price sub-craft-profit ' + deepClass + '" title="' + deepTip + '">' +
            formatGold(deepProfitAdj) +
            '<span class="adj-delta">' + (deepDelta >= 0 ? '+' : '') + formatGoldShort(deepDelta) + ' vs buying</span>' +
          '</td>';
      }

      // ── Adjusted profit ────────────────────────────────────────
      var adjProfitCell = '';
      var stats = loadedCharacter && loadedCharacter.craftingStats;
      if (stats && (stats.multicraft_pct > 0 || stats.resourcefulness_pct > 0 || stats.conc_gold_per_charge > 0)) {
        var mc       = (stats.multicraft_pct      || 0) / 100;
        var res      = (stats.resourcefulness_pct || 0) / 100;
        var concCost = (stats.conc_gold_per_charge || 0) * 10000; // gold → copper

        // Multicraft: expected extra yield per craft
        var adjSell = item.sell_price * item.crafted_quantity * (1 + mc);
        // Resourcefulness: average ~35% of one reagent saved per proc
        var adjCost = item.optimal_cost * (1 - res * 0.35);
        var adjProfit = adjSell - adjCost - concCost;
        var adjClass  = adjProfit > 0 ? 'profit-positive' : 'profit-negative';

        // Build tooltip showing the breakdown
        var mcStr   = mc  > 0  ? '+' + (mc  * 100).toFixed(1) + '% multicraft'       : '';
        var resStr  = res > 0  ? '+' + (res * 100).toFixed(1) + '% resourcefulness'  : '';
        var concStr = concCost > 0 ? '−' + formatGoldShort(concCost) + '/craft ingenuity' : '';
        var tip = [mcStr, resStr, concStr].filter(Boolean).join(' · ');

        adjProfitCell = '<td class="price adj-profit ' + adjClass + '" title="' + tip + '">' +
          formatGold(adjProfit) +
          '<span class="adj-delta">' + (adjProfit >= item.optimal_profit ? '+' : '') +
          formatGoldShort(adjProfit - item.optimal_profit) + '</span>' +
        '</td>';
      }

      var rowClass = item.is_realm_item ? 'crafting-row crafting-row-realm' : 'crafting-row';
      var batchRow =
        '<tr class="batch-row hidden">' +
          '<td colspan="20"><div class="batch-result"></div></td>' +
        '</tr>';
      return '<tr class="' + rowClass + '"' +
          ' data-item="' + item.item_id + '"' +
          ' data-recipe="' + item.recipe_id + '"' +
          ' data-sell-price="' + item.sell_price + '"' +
          ' data-crafted-qty="' + item.crafted_quantity + '"' +
          ' data-optimal-cost="' + item.optimal_cost + '"' +
          ' data-deep-cost="' + (item.deep_cost || item.optimal_cost) + '"' +
          '>' +
        '<td>' + iconHtml + '</td>' +
        '<td><a href="https://www.wowhead.com/item=' + item.item_id + '" target="_blank" rel="noopener">' + escHtml(name) + '</a>' +
          '<span class="craft-qty"> ×' + item.crafted_quantity + '</span></td>' +
        sellPriceCell +
        '<td class="price">' + formatGold(item.direct_cost) + '</td>' +
        '<td class="price best-price">' + formatGold(item.optimal_cost) + '</td>' +
        '<td class="price ' + profitClass + '">' + formatGold(item.optimal_profit) + '</td>' +
        subCraftProfitCell +
        adjProfitCell +
        '<td><span class="trend-badge" data-item="' + item.item_id + '">…</span>' +
          '<button class="chart-btn" onclick="openChart(' + item.item_id + ', \'' + escHtml(name) + '\')" title="Price history">📈</button></td>' +
        '<td class="craft-count-cell">' +
          '<input type="number" class="craft-count-input" min="1" value="1" title="Number of crafts" oninput="updateBatchRow(this)">' +
          '<button class="btn-toggle" onclick="toggleReagents(this)">+</button>' +
        '</td>' +
        '</tr>' + batchRow + reagentRows;
    }

    // Recursively renders the sub-craft tree for a reagent node.
    // depth=0 means direct children of a reagent-row.
    function renderSubCraftTree(node, depth) {
      if (!node.sub_reagents || !node.sub_reagents.length) return '';
      var stats    = loadedCharacter && loadedCharacter.craftingStats;
      var hasStats = stats && (stats.multicraft_pct > 0 || stats.resourcefulness_pct > 0 || stats.conc_gold_per_charge > 0);
      var indent   = 52 + depth * 20; // px left-padding, increases with depth

      return node.sub_reagents.map(function(sr) {
        var srName      = sr.name || ('Item #' + sr.item_id);
        var hasChildren = sr.is_craftable && sr.sub_reagents && sr.sub_reagents.length > 0;

        // Craft-cheaper badge on sub-reagent rows
        var srBuyTotal   = (sr.market_price || 0) * sr.quantity;
        var srCraftTotal = sr.is_craftable ? (sr.resolved_cost || 0) * sr.quantity : srBuyTotal;
        var srNote = '';
        if (sr.is_craftable && srBuyTotal > 0 && srCraftTotal < srBuyTotal) {
          srNote = ' <span class="subcraft-badge subcraft-cheaper">🔨 ' +
            formatGoldShort(srCraftTotal) + ' (save ' + formatGoldShort(srBuyTotal - srCraftTotal) + ')</span>';
        } else if (sr.is_craftable && srBuyTotal > 0) {
          srNote = ' <span class="subcraft-badge subcraft-pricier">🔨 ' + formatGoldShort(srCraftTotal) + ' (buy cheaper)</span>';
        }

        var row = '<tr class="sub-reagent-row hidden" data-depth="' + depth + '">' +
          '<td></td>' +
          '<td class="reagent-name" style="padding-left:' + indent + 'px">⬩ ' +
            '<a href="https://www.wowhead.com/item=' + sr.item_id + '" target="_blank" rel="noopener">' + escHtml(srName) + '</a>' +
            ' ×' + sr.quantity + srNote +
            (hasChildren ? ' <button class="btn-toggle btn-tiny" onclick="toggleSubReagents(this)" title="Show sub-materials">🔨</button>' : '') +
          '</td>' +
          '<td></td><td></td>' +
          '<td class="price">' + formatGold(srBuyTotal) + '</td>' +
          '<td></td>' +
          (currentTableHasSubCraft ? '<td></td>' : '') +
          (hasStats ? '<td></td>' : '') +
          '<td><span class="trend-badge" data-item="' + sr.item_id + '">…</span></td>' +
          '<td></td>' +
        '</tr>';

        return row + (hasChildren ? renderSubCraftTree(sr, depth + 1) : '');
      }).join('');
    }

    function loadTrendBadges(container) {
      var badges = container.querySelectorAll('.trend-badge');
      var seen = {};
      for (var i = 0; i < badges.length; i++) {
        var itemId = badges[i].getAttribute('data-item');
        if (seen[itemId]) continue;
        seen[itemId] = true;
        (function(id) {
          fetch('/api/prices/analysis/' + id + '?region=' + getRegion())
            .then(function(r) { return r.json(); })
            .then(function(d) {
              var label, cls;
              if (d.data_points < 2)             { label = '—';         cls = ''; }
              else if (d.trend === 'rising')      { label = '↑ Rising';  cls = 'trend-up'; }
              else if (d.trend === 'falling')     { label = '↓ Falling'; cls = 'trend-down'; }
              else                                { label = '→ Stable';  cls = 'trend-stable'; }
              if (d.buy_signal)  { label += ' 🟢 Buy';  cls = 'trend-buy'; }
              if (d.sell_signal) { label += ' 🔴 Sell'; cls = 'trend-sell'; }
              container.querySelectorAll('.trend-badge[data-item="' + id + '"]').forEach(function(el) {
                el.textContent = label;
                el.className = 'trend-badge ' + cls;
              });
            })
            .catch(function() {});
        })(itemId);
      }
    }

    function toggleReagents(btn) {
      var row = btn.closest('tr');
      var next = row.nextElementSibling;
      // Skip the batch-row (it's not toggled with reagents)
      if (next && next.classList.contains('batch-row')) next = next.nextElementSibling;
      var opening = btn.textContent === '+';
      while (next && (next.classList.contains('reagent-row') || next.classList.contains('variant-row') || next.classList.contains('sub-reagent-row'))) {
        if (next.classList.contains('reagent-row')) {
          if (opening) next.classList.remove('hidden');
          else next.classList.add('hidden');
        } else {
          // Always hide sub-reagent and variant rows; reset their expand buttons when collapsing
          next.classList.add('hidden');
          if (!opening) {
            var subBtn = next.querySelector('.btn-toggle.btn-tiny[onclick*="toggleSubReagents"]');
            if (subBtn) subBtn.textContent = '🔨';
          }
        }
        next = next.nextElementSibling;
      }
      btn.textContent = opening ? '−' : '+';
    }

    function toggleVariants(btn) {
      var row = btn.closest('tr');
      var next = row.nextElementSibling;
      while (next && next.classList.contains('variant-row')) {
        next.classList.toggle('hidden');
        next = next.nextElementSibling;
      }
      btn.textContent = btn.textContent === '+' ? '−' : '+';
    }

    function toggleSubReagents(btn) {
      var row          = btn.closest('tr');
      var isReagentRow = row.classList.contains('reagent-row');
      var parentDepth  = isReagentRow ? -1 : parseInt(row.getAttribute('data-depth') || '0');
      var childDepth   = parentDepth + 1;

      // Collect all subsequent sub-reagent-rows in this tree scope.
      // Stop when we exit the scope: a non-sub/variant row, or (for sub-rows) a row at depth ≤ parentDepth.
      var siblings = [];
      var next = row.nextElementSibling;
      while (next) {
        if (!next.classList.contains('sub-reagent-row') && !next.classList.contains('variant-row')) break;
        if (next.classList.contains('sub-reagent-row')) {
          var d = parseInt(next.getAttribute('data-depth') || '0');
          if (!isReagentRow && d <= parentDepth) break;
          siblings.push(next);
        }
        next = next.nextElementSibling;
      }

      // Determine open/close by checking the first direct child's visibility.
      var firstChild = null;
      for (var i = 0; i < siblings.length; i++) {
        if (parseInt(siblings[i].getAttribute('data-depth') || '0') === childDepth) { firstChild = siblings[i]; break; }
      }
      if (!firstChild) return;

      var opening = firstChild.classList.contains('hidden');

      if (opening) {
        // Show only direct children (childDepth); deeper rows stay hidden until their own expand is clicked.
        siblings.forEach(function(r) {
          if (parseInt(r.getAttribute('data-depth') || '0') === childDepth) r.classList.remove('hidden');
        });
      } else {
        // Hide all descendants and reset their expand buttons.
        siblings.forEach(function(r) {
          if (parseInt(r.getAttribute('data-depth') || '0') >= childDepth) {
            r.classList.add('hidden');
            var subBtn = r.querySelector('.btn-toggle.btn-tiny[onclick*="toggleSubReagents"]');
            if (subBtn) subBtn.textContent = '🔨';
          }
        });
      }

      btn.textContent = opening ? '🔨−' : '🔨';
    }

    // ── Batch craft calculator ────────────────────────────────
    function updateBatchRow(input) {
      var n = Math.max(1, parseInt(input.value) || 1);
      var row = input.closest('tr');

      // batch-row is always the immediate next sibling of the crafting-row
      var batchRow = row.nextElementSibling;
      if (!batchRow || !batchRow.classList.contains('batch-row')) return;

      if (n <= 1) {
        input.value = 1;
        batchRow.classList.add('hidden');
        return;
      }

      var sellPrice   = parseFloat(row.getAttribute('data-sell-price'))   || 0;
      var craftedQty  = parseInt(row.getAttribute('data-crafted-qty'))    || 1;
      var optimalCost = parseFloat(row.getAttribute('data-optimal-cost')) || 0;
      var deepCost    = parseFloat(row.getAttribute('data-deep-cost'))    || optimalCost;

      var stats = loadedCharacter && loadedCharacter.craftingStats;
      var mc    = stats ? (stats.multicraft_pct      || 0) / 100 : 0;
      var res   = stats ? (stats.resourcefulness_pct || 0) / 100 : 0;
      var conc  = stats ? (stats.conc_gold_per_charge || 0) * 10000 : 0;

      // Use deep cost (crafted mats) if cheaper, then apply stats on top
      var baseCostPerCraft = Math.min(optimalCost, deepCost);
      var adjCostPerCraft  = baseCostPerCraft * (1 - res * 0.35) + conc;
      var expectedItems    = n * craftedQty * (1 + mc);
      var totalCost        = n * adjCostPerCraft;
      var totalSell        = expectedItems * sellPrice;
      var totalProfit      = totalSell - totalCost;
      var profitClass      = totalProfit >= 0 ? 'profit-positive' : 'profit-negative';

      var yieldStr = mc > 0
        ? '~' + expectedItems.toFixed(1) + ' items'
        : (n * craftedQty) + ' items';

      var resultEl = batchRow.querySelector('.batch-result');
      resultEl.innerHTML =
        '<span class="batch-label">' + n + ' crafts</span>' +
        '<span class="batch-arrow">→</span>' +
        '<span class="batch-yield">' + yieldStr + '</span>' +
        '<span class="batch-sep">·</span>' +
        '<span class="batch-stat">Materials: <strong>' + formatGold(totalCost) + '</strong></span>' +
        '<span class="batch-sep">·</span>' +
        '<span class="batch-stat">Revenue: <strong>' + formatGold(totalSell) + '</strong></span>' +
        '<span class="batch-sep">·</span>' +
        '<span class="batch-stat ' + profitClass + '">Profit: <strong>' + formatGold(totalProfit) + '</strong></span>' +
        (mc > 0  ? '<span class="batch-note">+' + (mc * 100).toFixed(1) + '% multicraft</span>' : '') +
        (res > 0 ? '<span class="batch-note">+' + (res * 100).toFixed(1) + '% resourcefulness</span>' : '');

      batchRow.classList.remove('hidden');
    }

    // ── Price chart modal ─────────────────────────────────────
    function openChart(itemId, name) {
      activeItemId = itemId;
      document.getElementById('chartTitle').textContent = name + ' — Price History';
      document.getElementById('chartModal').classList.remove('hidden');
      loadChart(itemId, 7);
    }

    function closeChart() {
      document.getElementById('chartModal').classList.add('hidden');
      if (activeChart) { activeChart.destroy(); activeChart = null; }
    }

    document.querySelectorAll('.chart-range').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.chart-range').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        if (activeItemId) loadChart(activeItemId, parseInt(btn.getAttribute('data-days')));
      });
    });

    function isDarkMode() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function loadChart(itemId, days) {
      if (activeChart) { activeChart.destroy(); activeChart = null; }
      Promise.all([
        fetch('/api/prices/history/' + itemId + '?region=' + getRegion() + '&days=' + days).then(function(r) { return r.json(); }),
        fetch('/api/prices/analysis/' + itemId + '?region=' + getRegion() + '&days=' + days).then(function(r) { return r.json(); }),
      ]).then(function(results) {
        var history  = results[0];
        var analysis = results[1];
        var bar = document.getElementById('analysisBar');
        if (analysis.data_points > 0) {
          var signal = '';
          if (analysis.buy_signal)       signal = '<span class="badge-buy">🟢 Good time to BUY</span>';
          else if (analysis.sell_signal) signal = '<span class="badge-sell">🔴 Good time to SELL</span>';
          bar.innerHTML =
            '<span>Avg: <b>' + formatGoldPlain(analysis.avg_price) + '</b></span>' +
            '<span>Min: <b>' + formatGoldPlain(analysis.min_price) + '</b></span>' +
            '<span>Max: <b>' + formatGoldPlain(analysis.max_price) + '</b></span>' +
            '<span>Trend: <b>' + analysis.trend + '</b></span>' +
            (signal ? '<span>' + signal + '</span>' : '') +
            '<span class="muted">' + analysis.data_points + ' data points</span>';
        } else {
          bar.innerHTML = '<span class="muted">Not enough history yet.</span>';
        }
        if (!history.length) return;
        var dark       = isDarkMode();
        var tickColor  = dark ? '#8890a8' : '#666';
        var gridColor  = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)';
        var lineColor  = dark ? '#3cb86a' : '#1a7f40';
        var fillColor  = dark ? 'rgba(60,184,106,0.12)' : 'rgba(26,127,64,0.1)';
        var labels = history.map(function(h) { return h.recorded_at.replace('T', ' ').slice(0, 16); });
        var prices = history.map(function(h) { return h.unit_price / 10000; });
        var ctx = document.getElementById('priceChart').getContext('2d');
        activeChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Price (gold)',
              data: prices,
              borderColor: lineColor,
              backgroundColor: fillColor,
              borderWidth: 2,
              pointRadius: history.length > 50 ? 0 : 3,
              tension: 0.2,
              fill: true,
            }],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                ticks: { maxTicksLimit: 8, maxRotation: 30, color: tickColor },
                grid:  { color: gridColor },
                border:{ color: gridColor },
              },
              y: {
                ticks: { callback: function(v) { return v + 'g'; }, color: tickColor },
                grid:  { color: gridColor },
                border:{ color: gridColor },
              },
            },
          },
        });
      }).catch(function() {});
    }

    // Re-render chart if OS color scheme changes while modal is open
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      if (activeItemId) {
        var activeDays = parseInt(document.querySelector('.chart-range.active').getAttribute('data-days'));
        loadChart(activeItemId, activeDays);
      }
    });

    document.getElementById('chartModal').addEventListener('click', function(e) {
      if (e.target === this) closeChart();
    });

    // ── Helpers ───────────────────────────────────────────────
    function formatGold(copper) {
      var gold   = Math.floor(copper / 10000);
      var silver = Math.floor((copper % 10000) / 100);
      var cop    = copper % 100;
      return '<span class="gold">' + gold + 'g</span> <span class="silver">' + silver + 's</span> <span class="copper">' + cop + 'c</span>';
    }

    function formatGoldPlain(copper) {
      if (!copper) return '—';
      return Math.floor(copper / 10000) + 'g ' + Math.floor((copper % 10000) / 100) + 's';
    }

    // Compact gold formatter for the flipping table (no coloured spans)
    function formatGoldShort(copper) {
      if (!copper && copper !== 0) return '—';
      var g = Math.floor(copper / 10000);
      var s = Math.floor((copper % 10000) / 100);
      var c = copper % 100;
      if (g > 0)            return g + 'g ' + s + 's';
      if (s > 0)            return s + 's ' + c + 'c';
      return c + 'c';
    }

    // ── Character filter ──────────────────────────────────────
    var loadedCharacter = null; // { name, realm, knownRecipeIds: Set, craftingStats }

    // Restore from localStorage on page load
    (function() {
      var saved = localStorage.getItem('wowah_character');
      if (saved) {
        try {
          var c = JSON.parse(saved);
          loadedCharacter = {
            name: c.name, realm: c.realm,
            professions:    c.professions,
            craftingStats:  c.craftingStats || {},
            knownRecipeIds: new Set(c.knownRecipeIdArr),
          };
          document.getElementById('charRealm').value = c.realm;
          document.getElementById('charName').value  = c.name;
          renderCharacterProfessions(c.professions);
          populateCraftingStatsUI(c.craftingStats || {});
          document.getElementById('charClearBtn').classList.remove('hidden');
          document.getElementById('charLoadBtn').textContent = 'Reload';
          updateCharSkillBar();
        } catch (e) {}
      }
    })();

    function loadCharacter() {
      var realm  = document.getElementById('charRealm').value.trim();
      var name   = document.getElementById('charName').value.trim();
      var region = getRegion();
      if (!realm || !name) {
        setCharStatus('Enter a realm and character name.', 'error');
        return;
      }

      setCharStatus('Loading…', '');
      document.getElementById('charLoadBtn').disabled = true;

      fetch('/api/character?region=' + encodeURIComponent(region) +
            '&realm=' + encodeURIComponent(realm) +
            '&name='  + encodeURIComponent(name))
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
          document.getElementById('charLoadBtn').disabled = false;
          if (!result.ok) {
            setCharStatus(result.data.error || 'Failed to load character.', 'error');
            return;
          }
          var c = result.data;
          var allIds = c.professions.reduce(function(acc, p) {
            return acc.concat(p.all_known_recipe_ids);
          }, []);
          var stats = c.crafting_stats || {};
          loadedCharacter = {
            name:           c.name,
            realm:          c.realm,
            professions:    c.professions,
            craftingStats:  stats,
            knownRecipeIds: new Set(allIds),
          };
          localStorage.setItem('wowah_character', JSON.stringify({
            name:             c.name,
            realm:            c.realm,
            professions:      c.professions,
            craftingStats:    stats,
            knownRecipeIdArr: allIds,
          }));
          setCharStatus('', '');
          document.getElementById('charClearBtn').classList.remove('hidden');
          document.getElementById('charLoadBtn').textContent = 'Reload';
          renderCharacterProfessions(c.professions);
          populateCraftingStatsUI(stats);
          jumpToCharacterExpansion(c.professions);
          applyCharacterFilter();
          reRenderCrafting();
        })
        .catch(function() {
          document.getElementById('charLoadBtn').disabled = false;
          setCharStatus('Could not reach the server.', 'error');
        });
    }

    function clearCharacter() {
      loadedCharacter = null;
      localStorage.removeItem('wowah_character');
      document.getElementById('charStatus').textContent = '';
      document.getElementById('charProfessions').innerHTML = '';
      document.getElementById('charCraftingStats').classList.add('hidden');
      document.getElementById('charConcentration').classList.add('hidden');
      document.getElementById('charClearBtn').classList.add('hidden');
      document.getElementById('charLoadBtn').textContent = 'Load';
      updateCharSkillBar();
      applyCharacterFilter();
      reRenderCrafting();
    }

    function populateCraftingStatsUI(stats) {
      document.getElementById('cstatMulticraft').value      = stats.multicraft_pct      || 0;
      document.getElementById('cstatResourcefulness').value = stats.resourcefulness_pct || 0;
      document.getElementById('cstatInspiration').value     = stats.inspiration_pct     || 0;
      document.getElementById('cstatConcGold').value        = stats.conc_gold_per_charge || '';

      // Concentration pool display
      var concEl = document.getElementById('charConcentration');
      var concProfs = (loadedCharacter && loadedCharacter.professions || [])
        .filter(function(p) { return p.concentration; });
      if (concProfs.length) {
        concEl.innerHTML = '<span class="cstat-label" style="display:block;margin-bottom:6px">Ingenuity</span>' +
          concProfs.map(function(p) {
          var c   = p.concentration;
          var pct = Math.round((c.remaining / c.maximum) * 100);
          var rechargeHours = Math.round(((c.maximum - c.remaining) * c.recharge_seconds) / 3600);
          return '<div class="conc-entry">' +
            '<span class="conc-prof">' + escHtml(p.name) + '</span>' +
            '<div class="skill-bar-track conc-track">' +
              '<div class="skill-bar-fill skill-bar-fill-max" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<span class="conc-nums">' + c.remaining + ' / ' + c.maximum + '</span>' +
            (rechargeHours > 0 ? '<span class="conc-recharge">Full in ~' + rechargeHours + 'h</span>' : '') +
          '</div>';
        }).join('');
        concEl.classList.remove('hidden');
      } else {
        concEl.classList.add('hidden');
      }

      document.getElementById('charCraftingStats').classList.remove('hidden');
    }

    // Wire up stat inputs — any change updates craftingStats and re-renders the table
    ['cstatMulticraft', 'cstatResourcefulness', 'cstatInspiration', 'cstatConcGold'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        if (!loadedCharacter) return;
        loadedCharacter.craftingStats = readCraftingStatsFromUI();
        // Persist updated stats
        var saved = localStorage.getItem('wowah_character');
        if (saved) {
          try {
            var c = JSON.parse(saved);
            c.craftingStats = loadedCharacter.craftingStats;
            localStorage.setItem('wowah_character', JSON.stringify(c));
          } catch (e) {}
        }
        reRenderCrafting();
      });
    });

    function readCraftingStatsFromUI() {
      return {
        multicraft_pct:       parseFloat(document.getElementById('cstatMulticraft').value)      || 0,
        resourcefulness_pct:  parseFloat(document.getElementById('cstatResourcefulness').value) || 0,
        inspiration_pct:      parseFloat(document.getElementById('cstatInspiration').value)     || 0,
        conc_gold_per_charge: parseFloat(document.getElementById('cstatConcGold').value)        || 0,
      };
    }

    function setCharStatus(msg, type) {
      var el = document.getElementById('charStatus');
      el.textContent = msg;
      el.className = 'char-status' + (type ? ' char-status-' + type : '');
    }

    function renderCharacterProfessions(professions) {
      var el = document.getElementById('charProfessions');
      if (!professions || !professions.length) { el.innerHTML = ''; return; }
      el.innerHTML = professions.map(function(p) {
        var best = p.tiers.reduce(function(a, b) { return (b.skill || 0) > (a.skill || 0) ? b : a; }, p.tiers[0]);
        var skillText = best ? (best.skill + ' / ' + best.max_skill + ' — ' + (best.expansion || '')) : '';
        var recipeCount = p.all_known_recipe_ids.length;
        return '<div class="char-prof-badge">' +
          '<span class="char-prof-name">' + escHtml(p.name) + '</span>' +
          (skillText ? '<span class="char-prof-skill">' + escHtml(skillText) + '</span>' : '') +
          '<span class="char-prof-recipes">' + recipeCount + ' recipes</span>' +
          '</div>';
      }).join('');
    }

    // Auto-select the expansion where the character has the highest combined skill,
    // then update the skill bar.
    function jumpToCharacterExpansion(professions) {
      if (!professions || !professions.length) return;

      // Sum skill across all professions per expansion, pick the one furthest along
      var skillByExp = {};
      professions.forEach(function(p) {
        p.tiers.forEach(function(t) {
          if (!t.expansion || !t.skill) return;
          skillByExp[t.expansion] = (skillByExp[t.expansion] || 0) + t.skill;
        });
      });

      // Prefer the most recent expansion (EXPANSION_ORDER index) with skill > 0
      var best = null;
      for (var i = 0; i < EXPANSION_ORDER.length; i++) {
        var exp = EXPANSION_ORDER[i];
        if (skillByExp[exp] > 0) { best = exp; break; }
      }
      if (!best) return;

      expansionSelect.value = best;
      localStorage.setItem('wowah_expansion', best);
      filterByExpansion(best, 'craftingGroups', 'craftingEmptyMsg');
      updateCharSkillBar();
    }

    // Show skill level badges for the currently selected expansion
    function updateCharSkillBar() {
      var bar = document.getElementById('charSkillBar');
      if (!loadedCharacter || !loadedCharacter.professions) {
        bar.classList.add('hidden');
        bar.innerHTML = '';
        return;
      }

      var exp = expansionSelect.value;
      if (exp === 'all') {
        bar.classList.add('hidden');
        bar.innerHTML = '';
        return;
      }

      var badges = loadedCharacter.professions
        .map(function(p) {
          var tier = null;
          for (var i = 0; i < p.tiers.length; i++) {
            if (p.tiers[i].expansion === exp) { tier = p.tiers[i]; break; }
          }
          if (!tier) return null;
          var pct  = tier.max_skill > 0 ? Math.round((tier.skill / tier.max_skill) * 100) : 0;
          var cls  = pct >= 100 ? 'skill-bar-fill-max' : pct >= 50 ? 'skill-bar-fill-mid' : 'skill-bar-fill-low';
          return '<div class="skill-bar-badge">' +
            '<span class="skill-bar-prof">' + escHtml(p.name) + '</span>' +
            '<div class="skill-bar-track">' +
              '<div class="skill-bar-fill ' + cls + '" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<span class="skill-bar-nums">' + tier.skill + ' / ' + tier.max_skill + '</span>' +
          '</div>';
        })
        .filter(Boolean);

      if (!badges.length) {
        bar.innerHTML = '<span class="skill-bar-none">Character has no profession for this expansion</span>';
      } else {
        bar.innerHTML = badges.join('');
      }
      bar.classList.remove('hidden');
    }

    // Hide/show crafting rows based on known recipes
    function applyCharacterFilter() {
      var groups = document.getElementById('craftingGroups');
      if (!groups) return;

      // If no character loaded, show everything
      if (!loadedCharacter) {
        groups.querySelectorAll('tr.crafting-row, tr.crafting-row-realm').forEach(function(row) {
          row.classList.remove('char-hidden');
        });
        updateEmptySections(groups);
        return;
      }

      var knownIds = loadedCharacter.knownRecipeIds;

      groups.querySelectorAll('table tbody tr').forEach(function(row) {
        if (!row.classList.contains('crafting-row') && !row.classList.contains('crafting-row-realm')) return;
        // recipe_id is stored as data-recipe on the row (added below in buildCraftingRow)
        var recipeId = parseInt(row.getAttribute('data-recipe'), 10);
        var known = !isNaN(recipeId) && knownIds.has(recipeId);
        row.classList.toggle('char-hidden', !known);
        // Also hide reagent rows that follow this row
        var next = row.nextElementSibling;
        while (next && (next.classList.contains('reagent-row') || next.classList.contains('variant-row'))) {
          next.classList.toggle('char-hidden', !known);
          next = next.nextElementSibling;
        }
      });

      updateEmptySections(groups);
    }

    // Hide expansion/profession groups that have no visible rows after character filter
    function updateEmptySections(groups) {
      groups.querySelectorAll('.expansion-group').forEach(function(eg) {
        var hasVisible = eg.querySelectorAll('tr.crafting-row:not(.char-hidden), tr.crafting-row-realm:not(.char-hidden)').length > 0;
        eg.style.display = hasVisible ? '' : 'none';
      });
      groups.querySelectorAll('.profession-group').forEach(function(pg) {
        var hasVisible = pg.querySelectorAll('.expansion-group:not([style*="none"])').length > 0;
        pg.style.display = hasVisible ? '' : 'none';
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showAlert(msg, type) {
      var el = document.getElementById('globalAlert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }
  </script>
