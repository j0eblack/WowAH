<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Node.js Website</title>    
    <link rel="stylesheet" href="css/styles.css"> <!-- Link to the CSS file -->
</head>
<body>
    <h1>Current prices</h1>
    <table>
        <tr>
            <th></th>
            <th>Weavercloth</th>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier1.png" width="30%"></td>
            <td></td>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier2.png" width="40%"></td>
            <td></td>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier3.png" width="40%"></td>
            <td></td>
        </tr>
    </table>
    <button id="myButton">Get Blizzard Data</button>
    
    <h1>Crafting possibilities</h1>
    <table>
        <tr>
            <th></th>
            <th>Spool of Weaverthread</th>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier1.png" width="30%"></td>
            <td></td>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier2.png" width="40%"></td>
            <td></td>
        </tr>
        <tr>
            <td><img src="images/professions-chaticon-quality-tier3.png" width="40%"></td>
            <td></td>
        </tr>
    </table>
    <button id="Update">Update Deals</button>
    <script>
        document.getElementById('myButton').addEventListener('click', () => {
            fetch('/api/external-data') // Call your server's endpoint
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('response').innerText = JSON.stringify(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('response').innerText = 'Error fetching data';
                });
        });
    </script>
</body>
</html>
